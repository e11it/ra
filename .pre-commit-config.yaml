repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: golangci-lint-public
        name: golangci-lint (public)
        entry: bash scripts/pre-commit-golangci-lint.sh public
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-commit]

      - id: golangci-lint-company
        name: golangci-lint (company)
        entry: bash scripts/pre-commit-golangci-lint.sh company
        language: system
        pass_filenames: false
        types: [go]
        stages: [pre-commit]

      - id: qa-fast
        name: qa-fast
        entry: make qa-fast
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: qa-security
        name: qa-security
        entry: make qa-security
        language: system
        pass_filenames: false
        stages: [pre-push]
