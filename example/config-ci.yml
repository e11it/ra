trimurlprefix: /topics/
# Startup-only (restart required): addr, proxy.enabled, proxy.proxyhost,
# access_log.exclude_paths. A reload changing any of them is rejected entirely.
# Минимальный конфиг для CI/DAST: RA должен подняться даже без upstream proxy.
access_log:
  exclude_paths: [/metrics, /health, /ready, /swagger, /swagger/ra.yaml]
proxy:
  enabled: true
  proxyhost: "http://localhost:9999"
identity:
  authenticated_user_header: X-Authenticated-User
  trusted_proxies: [127.0.0.1/32]
auth:
  urlvalidreg: ^dev1s\..+?$
  acl:
  - path: dev1s\.[a-z0-9-]+\.(doc)\.+?
    users:
    - any
    methods:
    - post
    contenttype:
    - application/vnd.kafka.avro.v2+json
body_validation:
  # Requires binary built with GO_TAGS containing "company".
  enabled: true
  allowed_operations: [CREATE, UPDATE, UPSERT, DELETE, SNAPSHOT, EVENT]
  checks: [no_partition, is_tombstone, envelope, payload, entity_key]
