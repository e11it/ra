trimurlprefix: /topics/
# Startup-only (restart required): addr, proxy.enabled, proxy.proxyhost,
# access_log.exclude_paths. A reload changing any of them is rejected entirely.
# Список [http.Request.URL.Path] (без query), для которых не пишется access-лог (Gin).
# По умолчанию — технические endpoint'ы; переопредели, если нужен полный access-лог.
access_log:
  exclude_paths: [/metrics, /health, /ready, /swagger, /swagger/ra.yaml]
proxy:
  enabled: true
  proxyhost: "http://host.docker.internal:9999"
identity:
  authenticated_user_header: X-Authenticated-User
  # Add the exact nginx IP (/32 or /128) or its narrow network CIDR.
  # Empty means forwarded identities are ignored and the ACL user is "anon".
  trusted_proxies: []
auth:
  urlvalidreg: ^dev1s\..+?$
  acl:
  - path: dev1s\.[a-z0-9-]+\.(doc)\.+?
    users:
    - any
    methods:
    - post
    contenttype:
    - application/vnd.kafka.avro.v2+json
body_validation:
  # Requires binary built with GO_TAGS containing "company".
  # If enabled, POST body must be non-empty; empty/whitespace body returns 400 from RA.
  enabled: false
  allowed_operations: [CREATE, UPDATE, UPSERT, DELETE, SNAPSHOT, EVENT]
  checks: [no_partition, is_tombstone, envelope, payload, entity_key]
