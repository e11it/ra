name: Quality and Security
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-public:
    name: Lint public
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Install golangci-lint v2.11.4
        run: GOBIN="${PWD}/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Run golangci-lint (public)
        run: ./bin/golangci-lint run --timeout=5m --config=.golangci.yml ./...

  lint-company:
    name: Lint company
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Install golangci-lint v2.11.4
        run: GOBIN="${PWD}/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Run golangci-lint (company)
        run: ./bin/golangci-lint run --build-tags=nomsgpack,company --timeout=5m --config=.golangci.yml ./...

  quality-public:
    name: Quality public
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Download modules
        run: go mod download
      - name: Verify go.mod and go.sum
        run: go mod tidy && git diff --exit-code -- go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -shuffle=on -count=1 ./...
      - name: Build
        run: go build ./...

  quality-company:
    name: Quality company
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Download modules
        run: go mod download
      - name: Vet (company)
        run: go vet -tags "nomsgpack,company" ./...
      - name: Test (company)
        run: go test -race -shuffle=on -count=1 -tags "nomsgpack,company" ./...
      - name: Build (company)
        run: go build -tags "nomsgpack,company" ./...

  sast:
    name: SAST (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Run gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.25.0 -exclude-dir='\.gomodcache' -exclude-dir='\.gocache' ./...

  sca:
    name: SCA (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  scan-fs:
    name: Trivy FS scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  scan-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: make docker-build RA_DOCKER_VARIANT=public
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ra:public
          severity: HIGH,CRITICAL
          exit-code: "1"

  docker-publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    environment: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    needs:
      - lint-public
      - lint-company
      - quality-public
      - quality-company
      - sast
      - sca
      - scan-fs
      - scan-image
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute image metadata
        id: image_meta
        env:
          IS_MASTER: ${{ github.ref == 'refs/heads/master' }}
        run: |
          image_tag="${GITHUB_REF_NAME}"
          if [[ "${IS_MASTER}" == "true" ]]; then
            image_tag="latest"
          fi
          go_version="$(sed -n 's/^go //p' go.mod)"
          test -n "${go_version}"
          {
            echo "tag=${image_tag}"
            echo "go_version=${go_version}"
            echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/RA.Dockerfile
          push: true
          tags: e11it/ra:${{ steps.image_meta.outputs.tag }}
          build-args: |
            GOLANG_VERSION=${{ steps.image_meta.outputs.go_version }}
            GO_TAGS=nomsgpack
            APP_VERSION=${{ steps.image_meta.outputs.tag }}
            APP_COMMIT_SHA=${{ github.sha }}
            APP_IMAGE_DATE_CREATED=${{ steps.image_meta.outputs.created }}

  dast-nightly:
    name: DAST nightly (OWASP ZAP baseline)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: Start upstream stub for proxy
        run: |
          # NOTE: with --network host, -p port mapping is ignored. Listen on :9999 directly.
          docker run -d --name ra-upstream-stub --network host hashicorp/http-echo:1.0.0 -listen :9999 -text ok
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Build RA binary
        run: go build -tags "nomsgpack,company" -o ra .
      - name: Start RA server
        run: |
          RA_CONFIG_FILE=example/config-ci.yml ./ra > ra.log 2>&1 &
          echo $! > ra.pid
      - name: Wait for RA
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if ./ra -healthcheck -healthcheck-url http://localhost:8080/ready >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "ra did not become ready in time"
          echo "==> upstream container status"
          docker ps -a --filter name=ra-upstream-stub || true
          docker logs --tail 200 ra-upstream-stub || true
          test -f ra.log && tail -n 200 ra.log || true
          exit 1
      - name: Prepare workspace for ZAP reports
        run: |
          # ZAP container runs as non-root user; ensure it can write into mounted workspace.
          sudo chmod -R a+rwx "$GITHUB_WORKSPACE"
      - name: OWASP ZAP baseline (action)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://localhost:8080"
          allow_issue_writing: false
          cmd_options: "-I -m 3 -r report_html.html -J report_json.json"
      - name: Topics POST (autorun plan)
        continue-on-error: true
        run: |
          docker run --rm --network host -v "${PWD}:/zap/wrk:rw" ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -port 8090 -autorun /zap/wrk/.zap/zap-topics-nightly.yaml
      - name: Topics negative-cases regression check
        run: |
          python3 - <<'PY'
          import json
          import sys
          import urllib.request
          import urllib.error
          
          BASE = "http://localhost:8080"
          TOPIC = "/topics/dev1s.example.doc.test.v1"
          
          def req(method, path, headers=None, body=None):
            headers = headers or {}
            data = None if body is None else body.encode("utf-8")
            r = urllib.request.Request(BASE + path, data=data, headers=headers, method=method)
            try:
              with urllib.request.urlopen(r, timeout=5) as resp:
                return resp.getcode()
            except urllib.error.HTTPError as e:
              return e.code
          
          good_body = json.dumps({
            "value_schema": "{\"type\":\"record\",\"name\":\"Event\",\"fields\":[{\"name\":\"envelope\",\"type\":{\"type\":\"record\",\"name\":\"Envelope\",\"fields\":[{\"name\":\"meta\",\"type\":{\"type\":\"record\",\"name\":\"Meta\",\"fields\":[{\"name\":\"eventId\",\"type\":\"string\"},{\"name\":\"entityKey\",\"type\":\"string\"},{\"name\":\"operation\",\"type\":\"string\"},{\"name\":\"eventTime\",\"type\":{\"type\":\"long\",\"logicalType\":\"timestamp-millis\"}},{\"name\":\"eventTimeZone\",\"type\":\"string\"}]}} ,{\"name\":\"tech\",\"type\":{\"type\":\"record\",\"name\":\"Tech\",\"fields\":[{\"name\":\"sourceSystem\",\"type\":\"string\"},{\"name\":\"schemaVersion\",\"type\":\"int\"},{\"name\":\"producedAt\",\"type\":{\"type\":\"long\",\"logicalType\":\"timestamp-millis\"}}]}}]}},{\"name\":\"payload\",\"type\":[\"null\",{\"type\":\"record\",\"name\":\"Payload\",\"fields\":[{\"name\":\"value\",\"type\":\"string\"}]}],\"default\":null}]}",
            "records": [{
              "key": "entity-1",
              "value": {
                "envelope": {
                  "meta": {
                    "eventId": "00000000-0000-0000-0000-000000000001",
                    "entityKey": "entity-1",
                    "operation": "CREATE",
                    "eventTime": 1743849600000000,
                    "eventTimeZone": "Europe/Moscow"
                  },
                  "tech": {
                    "sourceSystem": "DAST",
                    "schemaVersion": 0,
                    "producedAt": 1743849600000000
                  }
                },
                "payload": { "Payload": { "value": "ok" } }
              }
            }]
          })
          
          cases = [
            ("topics_wrong_content_type", "POST", TOPIC,
              {"Content-Type": "application/json"}, good_body, "4xx"),
            ("topics_empty_body", "POST", TOPIC,
              {"Content-Type": "application/vnd.kafka.avro.v2+json"}, "", "4xx"),
            ("topics_malformed_json", "POST", TOPIC,
              {"Content-Type": "application/vnd.kafka.avro.v2+json"}, "{\"records\":", "4xx"),
            ("topics_invalid_envelope", "POST", TOPIC,
              {"Content-Type": "application/vnd.kafka.avro.v2+json"}, json.dumps({
                "records": [{
                  "key": "entity-3",
                  "value": {
                    "envelope": {
                      "meta": {
                        "eventId": "00000000-0000-0000-0000-000000000003",
                        "entityKey": "entity-3",
                        "operation": "CREATE",
                        "eventTime": 1743849600000000,
                        "eventTimeZone": "MSK"
                      },
                      "tech": { "sourceSystem": "DAST", "schemaVersion": 1, "producedAt": 1743849600000000 }
                    },
                    "payload": { "Payload": { "value": "ok" } }
                  }
                }]
              }), "4xx"),
            ("auth_missing_original_uri", "GET", "/auth",
              {"X-Original-Method": "POST", "X-Real-Ip": "127.0.0.1"}, None, "4xx"),
            ("auth_wrong_content_type_header_for_post", "GET", "/auth",
              {"X-Original-Uri": TOPIC, "X-Original-Method": "POST", "Content-Type": "application/json", "X-Real-Ip": "127.0.0.1"}, None, "4xx"),
          ]
          
          failures = []
          for name, method, path, headers, body, expected in cases:
            code = req(method, path, headers=headers, body=body)
            ok = 400 <= code <= 499
            if code < 200:
              ok = False
            if 200 <= code <= 399:
              failures.append(f"{name}: regression (unexpected {code})")
            elif 500 <= code <= 599:
              failures.append(f"{name}: regression (server error {code})")
            elif not ok:
              failures.append(f"{name}: unexpected status {code} (expected 4xx)")
            else:
              print(f"{name}: ok ({code})")
          
          if failures:
            print(\"\\n\".join(failures), file=sys.stderr)
            sys.exit(1)
          PY
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            topics_report_html.html
            topics_report_json.json
          if-no-files-found: ignore
      - name: Stop stack
        if: always()
        run: |
          docker rm -f ra-upstream-stub >/dev/null 2>&1 || true
          if [ -f ra.pid ]; then kill "$(cat ra.pid)" || true; fi
          rm -f ra.pid

  dast-full:
    name: DAST manual (OWASP ZAP full scan)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: Start upstream stub for proxy
        run: |
          # NOTE: with --network host, -p port mapping is ignored. Listen on :9999 directly.
          docker run -d --name ra-upstream-stub --network host hashicorp/http-echo:1.0.0 -listen :9999 -text ok
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Build RA binary
        run: go build -tags "nomsgpack,company" -o ra .
      - name: Start RA server
        run: |
          RA_CONFIG_FILE=example/config-ci.yml ./ra > ra.log 2>&1 &
          echo $! > ra.pid
      - name: Wait for RA
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if ./ra -healthcheck -healthcheck-url http://localhost:8080/ready >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "ra did not become ready in time"
          echo "==> upstream container status"
          docker ps -a --filter name=ra-upstream-stub || true
          docker logs --tail 200 ra-upstream-stub || true
          test -f ra.log && tail -n 200 ra.log || true
          exit 1
      - name: Prepare workspace for ZAP reports
        run: |
          # ZAP container runs as non-root user; ensure it can write into mounted workspace.
          sudo chmod -R a+rwx "$GITHUB_WORKSPACE"
      - name: OWASP ZAP full scan (action)
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: "http://localhost:8080"
          allow_issue_writing: false
          cmd_options: "-I -m 10 -r report_html.html -J report_json.json"
      - name: Topics POST (autorun plan)
        continue-on-error: true
        run: |
          docker run --rm --network host -v "${PWD}:/zap/wrk:rw" ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -port 8090 -autorun /zap/wrk/.zap/zap-topics-full.yaml
      - name: Topics negative-cases regression check
        run: |
          python3 - <<'PY'
          import json
          import sys
          import urllib.request
          import urllib.error
          
          BASE = "http://localhost:8080"
          TOPIC = "/topics/dev1s.example.doc.test.v1"
          
          def req(method, path, headers=None, body=None):
            headers = headers or {}
            data = None if body is None else body.encode("utf-8")
            r = urllib.request.Request(BASE + path, data=data, headers=headers, method=method)
            try:
              with urllib.request.urlopen(r, timeout=5) as resp:
                return resp.getcode()
            except urllib.error.HTTPError as e:
              return e.code
          
          good_body = json.dumps({
            "value_schema": "{\"type\":\"record\",\"name\":\"Event\",\"fields\":[{\"name\":\"envelope\",\"type\":{\"type\":\"record\",\"name\":\"Envelope\",\"fields\":[{\"name\":\"meta\",\"type\":{\"type\":\"record\",\"name\":\"Meta\",\"fields\":[{\"name\":\"eventId\",\"type\":\"string\"},{\"name\":\"entityKey\",\"type\":\"string\"},{\"name\":\"operation\",\"type\":\"string\"},{\"name\":\"eventTime\",\"type\":{\"type\":\"long\",\"logicalType\":\"timestamp-millis\"}},{\"name\":\"eventTimeZone\",\"type\":\"string\"}]}} ,{\"name\":\"tech\",\"type\":{\"type\":\"record\",\"name\":\"Tech\",\"fields\":[{\"name\":\"sourceSystem\",\"type\":\"string\"},{\"name\":\"schemaVersion\",\"type\":\"int\"},{\"name\":\"producedAt\",\"type\":{\"type\":\"long\",\"logicalType\":\"timestamp-millis\"}}]}}]}},{\"name\":\"payload\",\"type\":[\"null\",{\"type\":\"record\",\"name\":\"Payload\",\"fields\":[{\"name\":\"value\",\"type\":\"string\"}]}],\"default\":null}]}",
            "records": [{
              "key": "entity-1",
              "value": {
                "envelope": {
                  "meta": {
                    "eventId": "00000000-0000-0000-0000-000000000001",
                    "entityKey": "entity-1",
                    "operation": "CREATE",
                    "eventTime": 1743849600000000,
                    "eventTimeZone": "Europe/Moscow"
                  },
                  "tech": {
                    "sourceSystem": "DAST",
                    "schemaVersion": 0,
                    "producedAt": 1743849600000000
                  }
                },
                "payload": { "Payload": { "value": "ok" } }
              }
            }]
          })
          
          cases = [
            ("topics_wrong_content_type", "POST", TOPIC,
              {"Content-Type": "application/json"}, good_body, "4xx"),
            ("topics_empty_body", "POST", TOPIC,
              {"Content-Type": "application/vnd.kafka.avro.v2+json"}, "", "4xx"),
            ("topics_malformed_json", "POST", TOPIC,
              {"Content-Type": "application/vnd.kafka.avro.v2+json"}, "{\"records\":", "4xx"),
            ("topics_invalid_envelope", "POST", TOPIC,
              {"Content-Type": "application/vnd.kafka.avro.v2+json"}, json.dumps({
                "records": [{
                  "key": "entity-3",
                  "value": {
                    "envelope": {
                      "meta": {
                        "eventId": "00000000-0000-0000-0000-000000000003",
                        "entityKey": "entity-3",
                        "operation": "CREATE",
                        "eventTime": 1743849600000000,
                        "eventTimeZone": "MSK"
                      },
                      "tech": { "sourceSystem": "DAST", "schemaVersion": 1, "producedAt": 1743849600000000 }
                    },
                    "payload": { "Payload": { "value": "ok" } }
                  }
                }]
              }), "4xx"),
            ("auth_missing_original_uri", "GET", "/auth",
              {"X-Original-Method": "POST", "X-Real-Ip": "127.0.0.1"}, None, "4xx"),
            ("auth_wrong_content_type_header_for_post", "GET", "/auth",
              {"X-Original-Uri": TOPIC, "X-Original-Method": "POST", "Content-Type": "application/json", "X-Real-Ip": "127.0.0.1"}, None, "4xx"),
          ]
          
          failures = []
          for name, method, path, headers, body, expected in cases:
            code = req(method, path, headers=headers, body=body)
            ok = 400 <= code <= 499
            if 200 <= code <= 399:
              failures.append(f"{name}: regression (unexpected {code})")
            elif 500 <= code <= 599:
              failures.append(f"{name}: regression (server error {code})")
            elif not ok:
              failures.append(f"{name}: unexpected status {code} (expected 4xx)")
            else:
              print(f"{name}: ok ({code})")
          
          if failures:
            print(\"\\n\".join(failures), file=sys.stderr)
            sys.exit(1)
          PY
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-full-report
          path: |
            report_html.html
            report_json.json
            topics_full_report_html.html
            topics_full_report_json.json
          if-no-files-found: ignore
      - name: Stop stack
        if: always()
        run: |
          docker rm -f ra-upstream-stub >/dev/null 2>&1 || true
          if [ -f ra.pid ]; then kill "$(cat ra.pid)" || true; fi
          rm -f ra.pid
