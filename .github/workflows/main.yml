name: Quality and Security
on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-public:
    name: Lint public
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Install golangci-lint v2.11.4
        run: GOBIN="${PWD}/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Run golangci-lint (public)
        run: ./bin/golangci-lint run --timeout=5m --config=.golangci.yml ./...

  lint-company:
    name: Lint company
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Install golangci-lint v2.11.4
        run: GOBIN="${PWD}/bin" go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
      - name: Run golangci-lint (company)
        run: ./bin/golangci-lint run --build-tags=nomsgpack,company --timeout=5m --config=.golangci.yml ./...

  quality-public:
    name: Quality public
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Download modules
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...

  quality-company:
    name: Quality company
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Download modules
        run: go mod download
      - name: Vet (company)
        run: go vet -tags "nomsgpack,company" ./...
      - name: Test (company)
        run: go test -tags "nomsgpack,company" ./...
      - name: Build (company)
        run: go build -tags "nomsgpack,company" ./...

  sast:
    name: SAST (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Run gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.25.0 -exclude-dir='\.gomodcache' -exclude-dir='\.gocache' ./...

  sca:
    name: SCA (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  scan-fs:
    name: Trivy FS scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  scan-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: make docker-build RA_DOCKER_VARIANT=public
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ra:public
          severity: HIGH,CRITICAL
          exit-code: "1"

  docker-publish:
    name: Publish Docker image (tags)
    runs-on: ubuntu-latest
    environment: docker
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - lint-public
      - lint-company
      - quality-public
      - quality-company
      - sast
      - sca
      - scan-fs
      - scan-image
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute image metadata
        id: image_meta
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/RA.Dockerfile
          push: true
          tags: e11it/ra:${{ github.ref_name }}
          build-args: |
            GO_TAGS=nomsgpack
            APP_VERSION=${{ github.ref_name }}
            APP_COMMIT_SHA=${{ github.sha }}
            APP_IMAGE_DATE_CREATED=${{ steps.image_meta.outputs.created }}

  dast-nightly:
    name: DAST nightly (OWASP ZAP baseline)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Build RA binary
        run: go build -tags "nomsgpack,company" -o ra .
      - name: Start RA server
        run: |
          RA_CONFIG_FILE=example/config-ci.yml ./ra > ra.log 2>&1 &
          echo $! > ra.pid
      - name: Wait for RA
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if ./ra -healthcheck -healthcheck-url http://localhost:8080/ready >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "ra did not become ready in time"
          test -f ra.log && tail -n 200 ra.log || true
          exit 1
      - name: Prepare workspace for ZAP reports
        run: |
          # ZAP container runs as non-root user; ensure it can write into mounted workspace.
          sudo chmod -R a+rwx "$GITHUB_WORKSPACE"
      - name: OWASP ZAP baseline
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://localhost:8080"
          allow_issue_writing: false
          cmd_options: "-I -m 3 -r report_html.html -J report_json.json"
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
          if-no-files-found: ignore
      - name: Stop stack
        if: always()
        run: |
          if [ -f ra.pid ]; then kill "$(cat ra.pid)" || true; fi
          rm -f ra.pid

  dast-full:
    name: DAST manual (OWASP ZAP full scan)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: Build RA binary
        run: go build -tags "nomsgpack,company" -o ra .
      - name: Start RA server
        run: |
          RA_CONFIG_FILE=example/config-ci.yml ./ra > ra.log 2>&1 &
          echo $! > ra.pid
      - name: Wait for RA
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if ./ra -healthcheck -healthcheck-url http://localhost:8080/ready >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "ra did not become ready in time"
          test -f ra.log && tail -n 200 ra.log || true
          exit 1
      - name: Prepare workspace for ZAP reports
        run: |
          # ZAP container runs as non-root user; ensure it can write into mounted workspace.
          sudo chmod -R a+rwx "$GITHUB_WORKSPACE"
      - name: OWASP ZAP full scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: "http://localhost:8080"
          allow_issue_writing: false
          artifact_name: "zap-full-scan"
          cmd_options: "-I -m 10 -r report_html.html -J report_json.json"
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-full-report
          path: |
            report_html.html
            report_json.json
          if-no-files-found: ignore
      - name: Stop stack
        if: always()
        run: |
          if [ -f ra.pid ]; then kill "$(cat ra.pid)" || true; fi
          rm -f ra.pid
